<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비행기 슈팅 게임</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50; /* 어두운 배경 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* UI 레이어는 클릭을 통과시킴 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hidden {
            display: none !important;
        }

        #game-over-screen {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 10px;
            text-align: center;
            pointer-events: auto; /* 게임 오버 창은 클릭 가능해야 함 */
        }

        #game-over-screen h1 {
            color: #e74c3c;
            margin-bottom: 10px;
        }

        #game-over-screen p {
            font-size: 20px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        #score-display {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display">점수: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="ui-layer">
            <div id="game-over-screen" class="hidden">
                <h1>게임 오버!</h1>
                <p>최종 점수: <span id="final-score">0</span></p>
                <button id="restart-btn">다시 하기</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const restartBtn = document.getElementById('restart-btn');

        // 게임 상태 변수
        let isGameOver = false;
        let score = 0;
        let frameCount = 0;
        let animationId;

        // 키보드 입력 상태 저장
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };

        // 키 이벤트 리스너 등록
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp') keys.ArrowUp = true;
            if (e.code === 'ArrowDown') keys.ArrowDown = true;
            if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight') keys.ArrowRight = true;
            if (e.code === 'Space') {
                keys.Space = true;
                e.preventDefault(); // 스페이스바 스크롤 방지
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowUp') keys.ArrowUp = false;
            if (e.code === 'ArrowDown') keys.ArrowDown = false;
            if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight') keys.ArrowRight = false;
            if (e.code === 'Space') keys.Space = false;
        });

        // 다시 하기 버튼 클릭 이벤트
        restartBtn.addEventListener('click', initGame);

        // --- 객체 클래스 정의 ---

        // 플레이어 (파란색)
        class Player {
            constructor() {
                this.width = 30;
                this.height = 30;
                this.x = canvas.width / 2 - this.width / 2;
                this.y = canvas.height - 60;
                this.speed = 5;
                this.color = '#3498db'; // 파란색
                this.lastShot = 0;
                this.shotDelay = 15; // 총알 발사 딜레이 (프레임)
            }

            draw() {
                ctx.fillStyle = this.color;
                // 단순 사각형 대신 비행기 모양처럼 약간의 디테일 추가
                ctx.fillRect(this.x, this.y + 10, this.width, this.height - 10); // 몸통
                ctx.fillRect(this.x + 10, this.y, 10, 10); // 기수 (앞부분)
                ctx.fillRect(this.x - 10, this.y + 20, 50, 5); // 날개
            }

            update() {
                // 이동 처리 (화면 밖으로 나가지 못하게 제한)
                if (keys.ArrowLeft && this.x > 10) this.x -= this.speed;
                if (keys.ArrowRight && this.x < canvas.width - this.width - 10) this.x += this.speed;
                if (keys.ArrowUp && this.y > 0) this.y -= this.speed;
                if (keys.ArrowDown && this.y < canvas.height - this.height) this.y += this.speed;

                // 총알 발사
                if (keys.Space && frameCount - this.lastShot > this.shotDelay) {
                    bullets.push(new Bullet(this.x + this.width / 2, this.y));
                    this.lastShot = frameCount;
                }
            }
        }

        // 총알 (노란색)
        class Bullet {
            constructor(x, y) {
                this.width = 4;
                this.height = 15;
                this.x = x - this.width / 2;
                this.y = y;
                this.speed = 10;
                this.color = '#f1c40f'; // 노란색
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update() {
                this.y -= this.speed;
            }
        }

        // 적 (빨간색)
        class Enemy {
            constructor() {
                this.width = 30;
                this.height = 30;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = 2 + Math.random() * 3; // 2 ~ 5 사이의 랜덤 속도
                this.color = '#e74c3c'; // 빨간색
            }

            draw() {
                ctx.fillStyle = this.color;
                // 적 비행기 형태
                ctx.fillRect(this.x, this.y, this.width, this.height - 10); // 몸통
                ctx.fillRect(this.x + 10, this.y + 20, 10, 10); // 기수 (아래를 향함)
            }

            update() {
                this.y += this.speed;
            }
        }

        // 별 (배경 효과)
        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = 1 + Math.random() * 2;
            }
            draw() {
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = 0;
                    this.x = Math.random() * canvas.width;
                }
            }
        }

        // --- 전역 변수 설정 ---
        let player;
        let bullets = [];
        let enemies = [];
        let stars = [];

        // 충돌 체크 함수 (AABB: 축 정렬 경계 상자)
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        // 게임 초기화
        function initGame() {
            player = new Player();
            bullets = [];
            enemies = [];
            score = 0;
            frameCount = 0;
            isGameOver = false;
            
            scoreElement.innerText = score;
            gameOverScreen.classList.add('hidden');
            
            // 배경 별 초기화
            stars = [];
            for(let i=0; i<50; i++) {
                stars.push(new Star());
            }

            // 이전 애니메이션 루프가 있다면 취소
            if(animationId) cancelAnimationFrame(animationId);
            
            // 게임 루프 시작
            gameLoop();
        }

        // 메인 게임 루프
        function gameLoop() {
            if (isGameOver) return;

            // 배경 지우기
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            // 1. 배경 (별) 업데이트 및 그리기
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // 2. 플레이어 업데이트 및 그리기
            player.update();
            player.draw();

            // 3. 총알 업데이트 및 그리기
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.update();
                b.draw();

                // 화면 밖으로 나간 총알 제거
                if (b.y < 0) {
                    bullets.splice(i, 1);
                }
            }

            // 4. 적 생성 (일정 프레임마다)
            // 점수가 높아질수록 생성 주기를 짧게 만들 수 있습니다.
            let spawnRate = Math.max(20, 60 - Math.floor(score / 50)); 
            if (frameCount % spawnRate === 0) {
                enemies.push(new Enemy());
            }

            // 5. 적 업데이트 및 충돌 검사
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.update();
                e.draw();

                // 화면 밖으로 나간 적 제거
                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    continue;
                }

                // 충돌 검사: 플레이어 vs 적
                if (checkCollision(player, e)) {
                    gameOver();
                    break; // 게임 오버 시 더 이상 검사할 필요 없음
                }

                // 충돌 검사: 총알 vs 적
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (checkCollision(b, e)) {
                        // 충돌 시 적과 총알 제거, 점수 증가
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        scoreElement.innerText = score;
                        break; // 적이 파괴되었으므로 다른 총알과 검사 중지
                    }
                }
            }

            // 다음 프레임 요청
            animationId = requestAnimationFrame(gameLoop);
        }

        // 게임 오버 처리
        function gameOver() {
            isGameOver = true;
            finalScoreElement.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }

        // 게임 최초 실행
        initGame();
    </script>
</body>
</html>
